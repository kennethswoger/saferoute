name               = "saferoute-strava-proxy"
main               = "index.js"
compatibility_date = "2025-01-01"

[vars]
# Public — safe to commit
STRAVA_CLIENT_ID = "231694"
ALLOWED_ORIGINS  = "https://kennethswoger.github.io,http://localhost:8080"

workers_dev  = true
