<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SafeRoute — Grade My Route</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500&family=Lexend:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" data-state="idle">

    <header class="header">
      <span class="logo">SafeRoute</span>
      <span class="tagline">Grade My Route</span>
    </header>

    <main class="main">

      <!-- ── Upload state ── -->
      <section class="upload-zone" id="uploadZone">
        <div class="upload-inner" id="dropTarget">
          <div class="upload-icon">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
              <path d="M24 10V34M24 10L15 19M24 10L33 19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 38H40" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
            </svg>
          </div>
          <h1 class="upload-title">Drop your route file</h1>
          <p class="upload-sub">
            Supports <span class="badge">.gpx</span> <span class="badge">.tcx</span> <span class="badge">.fit</span>
          </p>
          <div class="profile-wrap">
            <p class="profile-label">Ride Profile</p>
            <div class="profile-selector" id="profileSelector" role="group" aria-label="Ride profile">
              <label class="profile-opt">
                <input type="radio" name="rideProfile" value="solo">
                <span>Solo</span>
              </label>
              <label class="profile-opt">
                <input type="radio" name="rideProfile" value="club">
                <span>Club Ride</span>
              </label>
              <label class="profile-opt">
                <input type="radio" name="rideProfile" value="large_group">
                <span>Large Group</span>
              </label>
            </div>
          </div>
          <label class="btn-upload" for="fileInput">Browse files</label>
          <input type="file" id="fileInput" accept=".gpx,.tcx,.fit" hidden>
        </div>
        <p class="drop-hint">or drag and drop anywhere on this page</p>
        <div class="upload-or"><span>or</span></div>
        <button class="btn-strava" id="stravaBtn" aria-label="Connect with Strava">
          <img src="./assets/btn_strava_connect_with_orange.svg" alt="Connect with Strava">
        </button>
        <button class="btn-demo" id="demoBtn">Try the demo route</button>
      </section>

      <!-- ── Strava route picker state ── -->
      <section class="strava-zone" id="stravaZone" hidden>
        <div class="strava-picker-inner">
          <div class="strava-picker-header">
            <h2 class="strava-picker-title">Your Routes</h2>
            <div class="strava-picker-actions">
              <button class="btn-disconnect" id="disconnectBtn">Disconnect Strava</button>
              <button class="btn-back" id="stravaBackBtn">← Back</button>
            </div>
          </div>
          <div class="strava-route-list" id="stravaRouteList"></div>
        </div>
      </section>

      <!-- ── Loading state ── -->
      <section class="loading-zone" id="loadingZone" hidden>
        <div class="spinner"></div>
        <p class="loading-label" id="loadingLabel">Parsing route…</p>
      </section>

      <!-- ── Results state ── -->
      <section class="results-zone" id="resultsZone" hidden>
        <div class="results-layout">
          <!-- Left col: score + breakdown (step 5) -->
          <div class="results-panel" id="resultsPanel"></div>
          <!-- Right col: map -->
          <div class="map-wrap">
            <div id="map"></div>
            <button class="btn-route-toggle" id="routeToggleBtn" aria-label="Hide route" aria-pressed="true">
              <svg class="icon-eye-open" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg class="icon-eye-closed" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
              <span class="route-toggle-label">Route</span>
            </button>
          </div>
        </div>
      </section>

    </main>

    <footer class="footer">
      Map &copy; <a href="https://www.thunderforest.com" target="_blank" rel="noopener">Thunderforest</a>, &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap contributors</a>.
      Safety scores are informational only — always ride with awareness.
    </footer>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
